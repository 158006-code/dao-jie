<style>

canvas{display:block;background:#050a05;touch-action:none;width:100%;flex:1;min-height:0}

.top-bar::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(29,158,117,0.03) 40px,rgba(29,158,117,0.03) 41px);pointer-events:none}
.top-time{font-size:13px;font-weight:700;color:#9FE1CB;letter-spacing:0.05em;white-space:nowrap;text-shadow:0 0 8px #1D9E75}

.top-xp-fill{height:100%;background:linear-gradient(90deg,#1D9E75,#7fff44);border-radius:3px;transition:width 0.12s;position:relative}

.uc-name{font-size:11px;font-weight:600;color:#ddd;margin-bottom:3px}

.type-passive{background:#1a1a2a;color:#85B7EB}.type-evolve{background:#2a1a00;color:#EF9F27}

.build-overlay.show{display:flex}

.bc-icon{font-size:20px;margin-bottom:2px}
.bc-name{font-size:12px;font-weight:700;color:#ddd;margin-bottom:2px}

.build-start-btn{margin-top:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:10px 36px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.1em;box-shadow:0 0 20px rgba(29,158,117,0.5)}

/* v16: buff-toast移到combo下方，改为小型HUD条 */
.buff-toast{position:fixed;top:108px;left:50%;transform:translateX(-50%);z-index:75;pointer-events:none;

<script>
// ══════ zzfx ══════
let zzfxX;
function zzfx(...z){zzfxX=zzfxX||new AudioContext();let b=zzfxX,d=b.createBuffer(1,b.sampleRate*z[1],b.sampleRate),e=d.numberOfChannels;for(let f=e;f--;){let g=d.getChannelData(f),h=z[0]||1,i=z[2]*2*Math.PI/b.sampleRate||220*2*Math.PI/b.sampleRate,j=z[3]||0,k=z[4]||0,l=z[5]||0,m=z[6]||0,n=z[7]||0,o=z[8]||0,p=z[9]||0,q=z[10]||0,r=0,s=0,t=0,u=1,v=0,w=0;for(let x=d.numberOfChannels;x--;)for(let y=0,A=0,B,C;y<g.length;y++){B=i+(j*y/g.length);C=n?1-2*(y/g.length%1*2-1):k?Math.sign(Math.sin(i*(y+1)))*h:m?Math.random()*2-1:Math.sin((r+=B));s=((C*u+(l?C<0?1:-1:0)*u)*h+o*(Math.random()*2-1));s=Math.min(Math.max(s,-1),1);g[y]=s*Math.cos(v++*p*2*Math.PI/b.sampleRate);}}const c=b.createBufferSource();c.buffer=d;c.connect(b.destination);c.start();return c;}
let soundEnabled=true;
function playSound(type){
  if(!soundEnabled)return;
  try{
    switch(type){
      case'kill':zzfx(.4,.06,520,.04,.01,.1,1,1.5,0,0,0,0,0,0,0,.1,.02,0,0,.02);break;
      case'hit':zzfx(.6,.08,180,.03,.01,.04,1,.8,0,0,0,0,0,0,0,.2,.02,0,0,.01);break;
      case'levelup':zzfx(.5,.3,300,.05,.05,.15,0,1.5,0,0,200,.05,.1,0,0,0,.05,.5,0,.1);break;
      case'ultra':zzfx(.8,.4,80,.05,.1,.3,1,.5,-5,0,0,0,0,0,0,.3,.1,.3,0,.05);break;
      case'hurt':zzfx(.7,.12,160,.01,.01,.08,1,-.5,0,0,0,0,0,0,0,.4,.01,0,0,.02);break;
      case'boss':zzfx(1,.6,60,.05,.1,.5,1,-.2,-4,0,0,0,0,0,0,.3,.15,.3,0,.1);break;
      case'bossdeath':zzfx(1,.8,50,.05,.1,.7,1,-.3,-5,0,0,0,0,0,0,.4,.2,.5,.1,.1);break;
      case'shoot':zzfx(.3,.05,600,.02,.01,.05,0,1.2,0,0,0,0,0,0,0,.05,.01,0,0,.02);break;
      case'poison':zzfx(.3,.25,200,.01,.05,.2,1,0,0,0,0,0,0,5,0,.1,.05,0,.1,.05);break;
      case'thunder':zzfx(.5,.15,800,.01,.01,.08,1,-2,0,0,0,0,0,8,0,.15,.01,0,0,.02);break;
      case'danger':zzfx(.6,.15,220,.02,.03,.1,1,-.8,0,0,0,0,0,0,0,.3,.02,0,0,.02);break;
      case'sync':zzfx(.5,.2,440,.03,.05,.1,0,1.2,0,0,150,.04,.08,0,0,0,.04,.4,0,.06);break;
      case'mycel':zzfx(.4,.3,90,.03,.1,.25,1,-.4,0,0,0,0,0,0,0,.2,.08,0,0,.05);break;
      case'pulse':zzfx(.7,.4,40,.02,.05,.4,1,-.3,-3,0,0,0,0,0,0,.3,.1,.4,.05,.08);break;
    }
  }catch(e){}
}

// ══════ Canvas ══════
const CV=document.getElementById('c');
const ctx=CV.getContext('2d');
let W,H;
function resizeCanvas(){
  const vw=window.innerWidth;W=vw;
  const topH=document.querySelector('.top-bar').offsetHeight||26;
  const wepH=document.querySelector('.weapon-row').offsetHeight||50;
  const botH=document.querySelector('.bottom-bar').offsetHeight||34;
  const bossH=document.getElementById('boss-wrap').classList.contains('show')?(document.getElementById('boss-wrap').offsetHeight||22):0;
  H=Math.max(200,window.innerHeight-topH-wepH-botH-bossH);
  CV.width=W;CV.height=H;CV.style.width=W+'px';CV.style.height=H+'px';
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const FPS=60;
// v22: Boss每3分钟（180秒）出现一次，无限循环
const BOSS_INTERVAL=180;
let SPEED=1,manualPaused=false;
const SPEEDS=[1,1.5,2,3];
let speedIdx=0;
function cycleSpeed(){
  speedIdx=(speedIdx+1)%SPEEDS.length;SPEED=SPEEDS[speedIdx];
  const labels=['1x ▶','1.5x ▶','2x ▶▶','3x ▶▶▶'];
  const btn=document.getElementById('speed-toggle-btn');
  btn.textContent=labels[speedIdx];btn.classList.toggle('active',speedIdx>0);
}
function togglePause(){
  if(G&&(G.dead||G.won))return;
  if(G&&G.upgrading)return;
  manualPaused=!manualPaused;
  if(G)G.paused=manualPaused;
  const btn=document.getElementById('pause-btn');
  btn.textContent=manualPaused?'继续':'暂停';
  btn.classList.toggle('paused',manualPaused);
}

// ══════ V13: 对象池 ══════
const PtPool=[],ProjPool=[],DmgPool=[];
function getPt(){return PtPool.pop()||{};}
function getProj(){return ProjPool.pop()||{};}
function getDmg(){return DmgPool.pop()||{};}
function recyclePt(p){if(PtPool.length<200)PtPool.push(p);}
function recycleProj(p){if(ProjPool.length<100)ProjPool.push(p);}
function recycleDmg(d){if(DmgPool.length<100)DmgPool.push(d);}

function addPt(G,x,y,color,n,spd){
  // 后期粒子减半（性能优化）
  const maxN=G.comboTier>=6?Math.ceil(n*0.5):n;
  for(let i=0;i<maxN;i++){
    const p=getPt();const a=Math.random()*Math.PI*2,s=(0.4+Math.random())*spd;
    p.x=x;p.y=y;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=1;p.color=color;p.r=1.5+Math.random()*1.5;
    G.pts.push(p);
  }
}
function addProj(G,x,y,vx,vy,opts){
  const p=getProj();Object.assign(p,{x,y,vx,vy,age:0,...opts});G.projs.push(p);
}
function addDamageText(G,x,y,text,color,size=16){
  const d=getDmg();d.x=x;d.y=y;d.text=text;d.color=color;d.size=size;d.life=40;d.vy=-0.7;
  G.damageTexts.push(d);
}

function screenShake(power){shakePower=Math.max(shakePower,power);}
function addExplosionWave(G,x,y,r,color){G.waves.push({x,y,r,life:20,color});}
function addArc(G,x,y,stars){G.arcs.push({x,y,life:20+stars*10,stars});}
function triggerFlash(){/* v15: 白屏闪烁已关闭 */}

// ══════ 工具函数 ══════
function nearestEnemy(G){
  let best=null,bd=Infinity;
  G.enemies.forEach(e=>{if(e.stealth&&e.stealthAlpha<0.3)return;const d=Math.hypot(e.x-G.mx,e.y-G.my);if(d<bd){bd=d;best=e;}});
  if(G.boss){const d=Math.hypot(G.boss.x-G.mx,G.boss.y-G.my);if(d<bd)best=G.boss;}
  return best;
}
function nearestEnemyTo(G,x,y){
  let best=null,bd=Infinity;
  G.enemies.forEach(e=>{const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}});
  if(G.boss){const d=Math.hypot(G.boss.x-x,G.boss.y-y);if(d<bd)best=G.boss;}
  return best;
}
function knockback(obj,fx,fy,force){const dx=obj.x-fx,dy=obj.y-fy,d=Math.hypot(dx,dy)||1;obj.vx+=(dx/d)*force;obj.vy+=(dy/d)*force;}

let bugId=0,enId=0;

// ══════ 敌人生成 ══════
function getAvailableTypes(sec){return ENEMY_TYPES.filter(t=>sec>=t.unlockSec);}
function spawnEnemyAt(G,typeKey,x,y){
  const def=ENEMY_TYPES.find(t=>t.key===typeKey)||ENEMY_TYPES[0];
  const sec=Math.floor(G.elapsed/FPS);
  const earlyMult=sec<60?0.8:sec<120?0.92:1;
  // 后期成长更猛，每120秒多一档
  const lateScale=sec>240?1+((sec-240)/100)*0.6:1;
  const diff=1.3*earlyMult*lateScale;
  G.enemies.push({
    id:enId++,x,y,vx:0,vy:0,
    hp:def.hpBase*(1+G.phase*0.6+G.lv*0.18)*diff,
    maxhp:def.hpBase*(1+G.phase*0.6+G.lv*0.18)*diff,
    spd:def.spdBase*(1+G.phase*0.07),
    sz:def.sz,poison:0,kbCd:0,slowTimer:0,
    hasKB:def.hasKB,atk:def.atk*diff,typeKey:def.key,col:def.col,
    special:def.special,defMult:def.defMult||1,keepDist:def.keepDist||0,
    explodeR:def.explodeR||0,explodeDmg:def.explodeDmg||0,
    rangedTimer:0,rangedCd:90,spawnTimer:0,spawnInterval:def.spawnInterval||180,
    regenRate:def.regenRate||0,magnetR:def.magnetR||0,
    stealthAlpha:1,stealthTimer:0,
    immuneDot:def.immuneDot||false,
    shield:def.special==='shield'?1:0,shieldCd:0,
    jumpTimer:0,jumpCd:80+Math.random()*40,jumping:false,jumpVx:0,jumpVy:0,
    devourCount:0,enrageTimer:0,
    // V13新增特殊属性
    overloadStacks:0,hivebuff:0,
  });
}
function spawnEnemy(G){
  const s=Math.floor(Math.random()*4);
  let x,y;
  if(s===0){x=Math.random()*W;y=-15;}
  else if(s===1){x=W+15;y=Math.random()*H;}
  else if(s===2){x=Math.random()*W;y=H+15;}
  else{x=-15;y=Math.random()*H;}
  const sec=Math.floor(G.elapsed/FPS);
  const avail=getAvailableTypes(sec);
  // V13: Build权重影响刷怪
  const base={normal:35,swift:20,armored:12,ranged:10,bomber:8,elite:6,queen:3,stealth:5,regen:5,magnetic:4,void:4,
    shield:8,jumper:10,devourer:4,suicidal:3,reflector:5,hivemind:3,corruptor:4};
  // [v14] Build不再克制玩家，改为略微配合主题（不加天敌）
  // 孢子流：稍多corruptor让地图更有生态感
  if(G.activeBuild==='spore'){base.corruptor=(base.corruptor||4)*1.3;}
  // 虫海流：稍多queen增加召唤感
  if(G.activeBuild==='swarm'){base.queen=(base.queen||3)*1.5;}
  const weights=avail.map(t=>base[t.key]||5);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,chosen=avail[0];
  for(let i=0;i<avail.length;i++){r-=weights[i];if(r<=0){chosen=avail[i];break;}}
  spawnEnemyAt(G,chosen.key,x,y);
}

// ══════ V13: 敌人协同AI ══════
function updateEnemyCooperation(G){
  // 巢核虫：给范围内所有敌人提供DOT免疫 + 加速
  G.enemies.forEach(hive=>{
    if(hive.special!=='hivemind')return;
    G.enemies.forEach(e=>{
      if(e===hive)return;
      if(Math.hypot(e.x-hive.x,e.y-hive.y)<100){
        e.hivebuff=30;// 持续帧
        e.immuneDot=true;
      }
    });
  });
  // 护盾虫：给旁边友军提供DOT护盾
  G.enemies.forEach(sh=>{
    if(sh.special!=='shield'||sh.shield<=0)return;
    G.enemies.forEach(e=>{
      if(e===sh)return;
      if(Math.hypot(e.x-sh.x,e.y-sh.y)<60){e.shieldBubble=Math.max(e.shieldBubble||0,20);}
    });
  });
  // 孵化虫：玩家如果不优先打，则指数增长
  G.enemies.forEach(q=>{
    if(q.special!=='spawner')return;
    q.spawnTimer=(q.spawnTimer||0)+1;
    if(q.spawnTimer>=q.spawnInterval){
      q.spawnTimer=0;
      spawnEnemyAt(G,'normal',q.x+(Math.random()-0.5)*30,q.y+(Math.random()-0.5)*30);
      // 存活越久，间隔越短
      q.spawnInterval=Math.max(60,q.spawnInterval-5);
    }
  });
  // hivebuff衰减
  G.enemies.forEach(e=>{if(e.hivebuff>0)e.hivebuff--;else{if(!e.immuneDot&&e.typeKey==='normal')e.immuneDot=false;}});
  G.enemies.forEach(e=>{if(e.shieldBubble>0)e.shieldBubble--;});
}

// ══════ 危险区域系统 ══════
function updateDangerZones(G){
  G.dangerZones=G.dangerZones||[];
  G.dangerCircles=G.dangerCircles||[];
  const sec=Math.floor(G.elapsed/FPS);
  if(sec>=180&&G.elapsed%300===0&&G.dangerZones.length<3){ // v15: 危险区延迟出现，频率降低，上限减少
    const types=['plasma','spore','corrosion'];
    const t=types[Math.floor(Math.random()*types.length)];
    const x=60+Math.random()*(W-120),y=60+Math.random()*(H-120);
    G.dangerZones.push({x,y,r:45+Math.random()*30,type:t,life:600+Math.random()*300,warn:60,active:false});
    playSound('danger');
  }
  G.dangerZones.forEach(z=>{
    if(z.warn>0){z.warn--;return;}
    z.active=true;z.life--;
    const dx=G.mx-z.x,dy=G.my-z.y;
    const inZone=dx*dx+dy*dy<z.r*z.r;
    if(inZone){
      switch(z.type){
        case'plasma':G.mhp-=0.035;if(G.elapsed%20===0)addPt(G,G.mx,G.my,'#7aadff',3,1.5);break; // v14: 降低
        case'spore':if(G.elapsed%40===0){G.mhp-=0.025;addPt(G,G.mx,G.my,'#7fff44',2,1);}break; // v14: 降低
        case'corrosion':G.mhp-=0.04;break; // v14: 降低
      }
    }
    if(z.type==='spore'&&z.active&&G.elapsed%90===0){
      spawnEnemyAt(G,'normal',z.x+(Math.random()-0.5)*z.r,z.y+(Math.random()-0.5)*z.r);
    }
  });
  G.dangerZones=G.dangerZones.filter(z=>z.life>0);
  G.dangerCircles.forEach(c=>c.life--);
  G.dangerCircles=G.dangerCircles.filter(c=>c.life>0);
  const hasPlasma=G.dangerZones.some(z=>z.type==='plasma'&&z.active);
  const hasSpore=G.dangerZones.some(z=>z.type==='spore'&&z.active);
  const hasCorr=G.dangerZones.some(z=>z.type==='corrosion'&&z.active);
  const hasMycel=false; // v14: 菌毯反噬系统已移除
  document.getElementById('di-plasma').classList.toggle('show',hasPlasma);
  document.getElementById('di-spore').classList.toggle('show',hasSpore);
  document.getElementById('di-hatch').classList.toggle('show',hasCorr);
  document.getElementById('di-mycel').classList.toggle('show',hasMycel);
}

function spawnBug(n,x,y){
  n=n||1;
  for(let i=0;i<n;i++){
    const cap=10+G.lv*2+G.swarmBonus;
    if(G.bugs.length>=cap)break;
    const a=Math.random()*Math.PI*2,rr=16+Math.random()*12;
    const hp=(1.5+G.lv*0.1)*(G.bugHpMult||1);
    // V13: 虫海流虫子分工
    const isSwarm=G.activeBuild==='swarm';
    const role=isSwarm?(['fighter','bomber','guard'][Math.floor(Math.random()*3)]):'fighter';
    G.bugs.push({id:bugId++,
      x:x!=null?x+(Math.random()-0.5)*20:G.mx+Math.cos(a)*rr,
      y:y!=null?y+(Math.random()-0.5)*20:G.my+Math.sin(a)*rr,
      vx:0,vy:0,hp,maxhp:hp,atkTimer:0,age:0,targetId:null,
      elite:Math.random()<(G.eliteRate||0.1),
      role,
    });
  }
}

function starStr(n){const stars=['★','★★','★★★','★★★★','★★★★★','★★★★★★'];return stars[n]||'★';}
function updateWeaponUI(){
  G.slots.forEach((sl,i)=>{
    const el=document.getElementById('ws'+i);
    if(!sl.id){el.innerHTML='<div class="ws-empty">空</div>';el.className='weapon-slot';return;}
    const w=WEAPONS[sl.id];
    const isEv=w.type==='evolve'||w.type==='evolvePassive';
    const isPassive=w.type==='passive'||w.type==='evolvePassive';
    const stars=sl.stars||0;const pct=sl.lv/w.maxLv*100;
    const evCls=['',' evolved',' evolved2',' evolved3',' evolved4',' evolved5',' evolved6'];
    const starLabels=['★','★★','★★★','★★★★','★★★★★','★★★★★★'];
    const badgeCls=['evolved-badge','evolved-badge','evolved2-badge','evolved3-badge','evolved4-badge','evolved5-badge','evolved6-badge'];
    let cls='weapon-slot';
    if(isEv&&stars>=0)cls+=evCls[Math.min(stars,5)+1];
    if(isPassive&&!isEv)cls+=' passive-active';
    el.className=cls;
    let badge='';
    if(isEv)badge=`<div class="${badgeCls[Math.min(stars,5)+1]}">${starLabels[Math.min(stars,5)]}</div>`;
    const barClass=isEv?evCls[Math.min(stars,5)+1]:'';
    const sLabel=isEv?' '+starStr(stars):'';
    const isPending=sl.id&&w.evolve&&G.pendingStarFor&&G.pendingStarFor[w.evolve]===i;
    const passiveDot=isPassive?'<div class="ws-passive-dot"></div>':'';
    el.innerHTML=`${badge}<div class="ws-name">${w.name}${sLabel}${isPending?'⊕':''}</div><div class="ws-lv">Lv.${sl.lv}/${w.maxLv}</div><div class="ws-bar-wrap"><div class="ws-bar${barClass}" style="width:${pct}%"></div></div>${passiveDot}`;
  });
}

// ══════ 游戏更新 ══════
function update(){
  const steps=SPEED>=3?3:SPEED>=2?2:SPEED>=1.5?Math.random()<0.5?1:2:1;
  for(let s=0;s<steps;s++) _update();
}

function _update(){
  if(G.paused||G.dead||G.won)return;
  G.elapsed++;
  const sec=Math.floor(G.elapsed/FPS);

  // ── Combo Tier 系统 ──
  if(G.comboTimer>0){G.comboTimer--;}else{G.combo=0;}
  const prevTier=G.comboTier||0;
  G.comboTier=0;
  if(G.combo>=10)G.comboTier=1;if(G.combo>=25)G.comboTier=2;if(G.combo>=50)G.comboTier=3;
  if(G.combo>=80)G.comboTier=4;if(G.combo>=120)G.comboTier=5;if(G.combo>=200)G.comboTier=6;
  if(G.combo>=350)G.comboTier=7;if(G.combo>=500)G.comboTier=8;

  if(G.comboTier>prevTier){
    const tierNames=['','热身','狩猎','侵蚀','暴走','母巢同步','污染扩张','世界侵蚀','虫巢暴走'];
    const tierColors=['','#aaff44','#ffcc00','#ff9900','#ff4400','#ff2200','#cc00ff','#ff00aa','#ff00ff'];
    const tierBuffs=['','攻速+5%','攻速+10%','攻击+15%','攻击+25%/攻速+15%','攻击+40%','菌毯失控','世界腐败','虫巢暴走'];
    const tc=tierColors[G.comboTier]||'#ff8800';
    showBuffToast('⚡ '+tierNames[G.comboTier]+' · '+tierBuffs[G.comboTier],tc);
    screenShake(G.comboTier*1);playSound('sync'); // v15: 减少combo抖动
    for(let i=0;i<G.comboTier;i++){setTimeout(()=>{if(!G||G.dead)return;addExplosionWave(G,G.mx,G.my,14+i*6,tc);},i*80);}
    document.getElementById('h-sync-disp').style.display='block';
    document.getElementById('h-sync-disp').textContent='同步 '+tierNames[G.comboTier];
    document.getElementById('h-sync-disp').style.color=tc;
    // V13: Combo高tier触发世界变化
    if(G.comboTier>=6){
      // 菌毯扩张 v14: 提高触发门槛
      if(Math.random()<0.3)G.infectionMap.push({x:Math.random()*W,y:Math.random()*H,r:60,life:500,pulse:0,hostile:false});
    }
    if(G.comboTier>=6){G.infection=Math.min(1,(G.infection||0)+0.08);}
    if(G.comboTier>=7){G.worldCorrupt=true;}
    if(G.comboTier>=8){G.overmind=true;}
  }
  if(G.comboTier===0)document.getElementById('h-sync-disp').style.display='none';

  // buffs计算
  const berserkBonus=G.activeBuild==='berserk'&&G.noDmgTimer>300?1+(G.berserkerLv||0)*0.12:1;
  G.buffs={atk:1.2*berserkBonus,spd:1.15};
  switch(G.comboTier){
    case 1:G.buffs.spd=1.2;break;case 2:G.buffs.spd=1.25;break;
    case 3:G.buffs.atk=1.35*berserkBonus;G.buffs.spd=1.2;break;
    case 4:G.buffs.atk=1.45*berserkBonus;G.buffs.spd=1.3;break;
    case 5:G.buffs.atk=1.6*berserkBonus;G.buffs.spd=1.3;break;
    case 6:G.buffs.atk=1.8*berserkBonus;G.buffs.spd=1.4;G.infection=Math.min(1,(G.infection||0)+0.002);break;
    case 7:G.buffs.atk=2.0*berserkBonus;G.worldCorrupt=true;break;
    case 8:G.buffs.atk=2.5*berserkBonus;G.overmind=true;break;
  }
  // [v14] 狂暴流高combo不再负减伤，改为维持0下限
  if(G.activeBuild==='berserk'&&G.comboTier>=5){
    G.dmgReduce=Math.max(0,G.dmgReduce);// 不再让玩家受额外伤害
  }

  // ── 菌毯成长（V13三阶段）──
  const phaseTime=G.elapsed/60;
  G.infection=Math.min(1,(G.infection||0)+0.0008);
  // 前期（0~2分钟）：缓慢扩展
  if(phaseTime<120&&G.elapsed%90===0&&G.infectionMap.length<20){
    G.infectionMap.push({x:Math.random()*W,y:Math.random()*H,r:35+Math.random()*45,life:900+Math.random()*300,pulse:Math.random()*999,hostile:false});
  }
  // 中期（2~6分钟）：自我扩张，感染尸体
  if(phaseTime>=120&&phaseTime<360&&G.elapsed%60===0&&G.infectionMap.length<35){
    // 从现有斑块扩展
    if(G.infectionMap.length>0){
      const src=G.infectionMap[Math.floor(Math.random()*G.infectionMap.length)];
      const ang=Math.random()*Math.PI*2,dist=50+Math.random()*80;
      G.infectionMap.push({x:src.x+Math.cos(ang)*dist,y:src.y+Math.sin(ang)*dist,r:30+Math.random()*35,life:700,pulse:Math.random()*999,hostile:false});
    }
  }
  // 后期（6分钟+）：菌毯开始反噬
  if(phaseTime>=480&&G.elapsed%60===0&&G.infectionMap.length<40){ // v15: hostile菌毯更晚出现
    G.infectionMap.push({x:Math.random()*W,y:Math.random()*H,r:40+Math.random()*50,life:600,pulse:Math.random()*999,hostile:true});
  }

  G.infectionMap.forEach(z=>{
    z.life--;z.pulse+=0.05;
    if(z.fastGrow)z.r=Math.min(z.r*1.002,180);
    const pdx=G.mx-z.x,pdy=G.my-z.y;
    if(pdx*pdx+pdy*pdy<z.r*z.r){
      if(z.hostile){
        G.mhp-=0.012;
        // v16: 菌毯反噬有文字反馈
        if(G.elapsed%80===0)addDamageText(G,G.mx+(Math.random()-0.5)*16,G.my-12,'菌毯侵蚀','#ff4422',10);
      }
      else if(phaseTime<180){G.mhp=Math.min(G.mmaxhp,G.mhp+0.025);}
      // v14: 中期菌毯中性，不伤也不治
      // 后期反噬（通过updateLateGameRules处理）
    }
    G.enemies.forEach(e=>{
      const dx=e.x-z.x,dy=e.y-z.y;
      if(dx*dx+dy*dy<z.r*z.r){
        if(!z.hostile&&phaseTime<180){e.slowTimer=Math.max(e.slowTimer||0,8);} // 轻微减速，不触发蓝色显示
        else if(z.hostile){e.rage=1.1;} // v14: rage效果减弱
      }
    });
    // 腐蚀虫增殖菌毯
    G.enemies.forEach(e=>{if(e.special==='corruptor'&&!z.hostile&&Math.hypot(e.x-z.x,e.y-z.y)<z.r*0.5){z.r=Math.min(z.r+0.05,120);z.hostile=phaseTime>180;}});
  });
  G.infectionMap=G.infectionMap.filter(z=>z.life>0);

  // ── V13: 后期规则变化 ──
  updateLateGameRules(G,sec);

  // ── V13: 敌人协同AI ──
  if(G.elapsed%6===0)updateEnemyCooperation(G);

  updateDangerZones(G);

  G.noDmgTimer=(G.noDmgTimer||0)+1;
  TIME_ALERTS.forEach(a=>{if(!shownAlerts.has(a.sec)&&sec>=a.sec){shownAlerts.add(a.sec);showAlert(a.msg,a.cls);}});
  if(alertTimer>0){alertTimer--;if(alertTimer<=0)document.getElementById('alert-banner').classList.remove('show');}
  if(ecoAlertTimer>0){ecoAlertTimer--;if(ecoAlertTimer<=0)document.getElementById('eco-alert').classList.remove('show');}

  const phaseNames=['前期·孵化','中期·扩张','后期·失控','末期·背叛'];
  const phaseIdx=phaseTime<120?0:phaseTime<360?1:phaseTime<480?2:3;
  const phaseLabelEl=document.getElementById('phase-label');
  if(phaseLabelEl)phaseLabelEl.textContent=phaseNames[phaseIdx];

  if(!G.bossMode){
    // v22: 每3分钟出现一个Boss，循环Boss类型，属性随时间成长
    if(!G.nextBossAt)G.nextBossAt=BOSS_INTERVAL;
    if(sec>=G.nextBossAt){
      G.nextBossAt=sec+BOSS_INTERVAL;
      const bossIdx=(G.bossKillCount||0)%BOSS_DEFS.length;
      triggerBoss(bossIdx,sec);
      return;
    }
  }

  // 移动
  const ms=1.9*G.buffs.spd;
  const prevMx=G.mx,prevMy=G.my;
  if(G.keys['a']||G.keys['A']||G.keys['ArrowLeft'])G.mx=Math.max(14,G.mx-ms);
  if(G.keys['d']||G.keys['D']||G.keys['ArrowRight'])G.mx=Math.min(W-14,G.mx+ms);
  if(G.keys['w']||G.keys['W']||G.keys['ArrowUp'])G.my=Math.max(14,G.my-ms);
  if(G.keys['s']||G.keys['S']||G.keys['ArrowDown'])G.my=Math.min(H-14,G.my+ms);

  // v18: 静止惩罚系统 —— 玩家不动时敌人快速聚拢并加速
  const moved=Math.hypot(G.mx-prevMx,G.my-prevMy)>0.5;
  if(moved){G.stillTimer=0;ecoAlertTimer=0;document.getElementById('eco-alert').classList.remove('show');}else{G.stillTimer=(G.stillTimer||0)+1;}
  // 静止超过1.5秒（90帧）开始施压
  const stillPressure=Math.min(1,(G.stillTimer||0)/180); // 0→1 线性，3秒满压
  if(stillPressure>0){
    G.enemies.forEach(e=>{
      const dx=G.mx-e.x,dy=G.my-e.y,d=Math.hypot(dx,dy)||1;
      // 加速朝玩家冲 + 额外吸力（满压×4.5）
      const surge=1+stillPressure*4.5;
      e.vx+=(dx/d)*e.spd*0.06*surge;
      e.vy+=(dy/d)*e.spd*0.06*surge;
    });
    // 静止满2/4/6秒额外刷怪（3只，更有压迫感）
    if(G.stillTimer===120||G.stillTimer===240||G.stillTimer===360){
      for(let i=0;i<3;i++)spawnEnemy(G);
    }
    // 满压时（>3秒静止）：环境伤害，每秒3点，模拟被完全包围
    if(stillPressure>=1&&G.elapsed%20===0){
      G.mhp-=1;
      addDamageText(G,G.mx+(Math.random()-0.5)*20,G.my-18,'包围！','#ff8800',11);
    }
  }

  // [v14已移除] 菌丝墙碰撞

  G.phase=G.kills<12?0:G.kills<35?1:G.kills<70?2:G.kills<130?3:4;

  // 敌人生成
  if(!G.bossMode){
    G.spawnTimer++;
    const earlyReduction=sec<60?0.80:sec<120?0.90:1;
    const comboMult=G.combo>=300?0.45:1;
    const rate=Math.max(8,(75-G.phase*12-G.lv*1.5)*(G.spawnMult||1)/1.6*comboMult/earlyReduction);
    if(G.spawnTimer>=rate){
      G.spawnTimer=0;
      const baseSpawn=G.combo>=300?3:1;
      for(let i=0;i<baseSpawn;i++)spawnEnemy(G);
      if(G.phase>=2&&sec>120)spawnEnemy(G);
      if((G.phase>=4||G.combo>=300)&&sec>180){spawnEnemy(G);spawnEnemy(G);}
      if(G.combo>=300&&Math.random()<0.3)spawnEnemyAt(G,'elite',Math.random()<0.5?-15:W+15,Math.random()*H);
    }
  }

  G.bugTimer++;
  const bugRate=Math.max(75,200*(G.spawnMult||1));
  const cap=10+G.lv*2+G.swarmBonus;
  if(G.bugTimer>=bugRate&&G.bugs.length<cap){G.bugTimer=0;spawnBug(1);}

  if(G.regenRate&&G.elapsed%60===0)G.mhp=Math.min(G.mmaxhp,G.mhp+G.regenRate*G.mmaxhp);

  // 武器系统
  G.slots.forEach(sl=>{
    if(!sl.id)return;const w=WEAPONS[sl.id];
    if(w.update)w.update(G,sl.lv,sl.state,sl.stars);
    if(w.onFire){
      sl.timer++;const cd=w.cd?w.cd[Math.min(sl.lv-1,w.cd.length-1)]:60;
      const starMults=[1,0.7,0.58,0.48,0.4,0.33];
      const starMult=starMults[Math.min(sl.stars||0,5)];
      // v17: 支持流派CD倍率（如电浆流提速）
      const buildCdMult=w.cdMult?w.cdMult(G):1;
      if(sl.timer>=cd*starMult*buildCdMult){sl.timer=0;w.onFire(G,sl.lv,sl.stars);}
    }
  });

  // ── 小虫副炮系统（独立调度，不修改母体武器）──
  // 每帧检测：装备了 attack 类型武器时，随机小虫以20%伤害复制发射
  // 关键：isBugShot:true 标记确保完全走 enemy 碰撞路径，绝不会打到母体/小虫自身
  if(G.bugs.length>0){
    G.bugShotTimer=(G.bugShotTimer||0)+1;
    // 副炮 CD：每45帧触发一次（约0.75秒），从随机虫子射出
    if(G.bugShotTimer>=45){
      G.bugShotTimer=0;
      // 收集所有已装备的 attack 类武器
      const attackSlots=G.slots.filter(sl=>{
        if(!sl.id)return false;
        const w=WEAPONS[sl.id];
        return w.onFire&&(w.type==='attack'||w.type==='evolve');
      });
      if(attackSlots.length>0){
        // 随机选一个已装备攻击武器
        const sl=attackSlots[Math.floor(Math.random()*attackSlots.length)];
        const w=WEAPONS[sl.id];
        // 随机选一只存活小虫作为发射源
        const srcBug=G.bugs[Math.floor(Math.random()*G.bugs.length)];
        // 找最近敌人（相对虫子位置）
        const tgt=nearestEnemyTo(G,srcBug.x,srcBug.y);
        if(tgt){
          const dx=tgt.x-srcBug.x,dy=tgt.y-srcBug.y,dist=Math.hypot(dx,dy)||1;

          const atkMult=G.buffs.atk;

          let bulletOpts;
          if(sl.id==='lightning_bug'||sl.id==='thunder_swarm'){

        }
      }
    }
  } else {
    G.bugShotTimer=0;
  }

  // ── V13: 虫子行动（分工角色）──
  const allTargets=[...G.enemies];if(G.boss)allTargets.push(G.boss);
  G.bugs.forEach((b,bi)=>{
    b.age++;
    let tgt=null;

      else{b.atkTimer++;if(b.atkTimer>=22){
        b.atkTimer=0;const atkMult=G.buffs.atk*(G.activeBuild==='swarm'?(G.bugAtkMult||1.6):1);
        const dmg=(b.elite?2.2:1.1)*atkMult*(1-(G.dmgReduce||0))/(tgt.defMult||1)/(tgt.shield?3:1)/(tgt.shieldBubble>0?2:1);

    } else {

      if(dd>25){b.vx=b.vx*0.88+(dx/dd)*0.12;b.vy=b.vy*0.88+(dy/dd)*0.12;}else{b.vx*=0.9;b.vy*=0.9;}
    }
    const mv=Math.hypot(b.vx,b.vy);if(mv>2.5){b.vx=b.vx/mv*2.5;b.vy=b.vy/mv*2.5;}

  });

  // ── 敌人行动 ──
  G.enemies.forEach(e=>{

    // 再生虫

    // [v14已移除] 隐遁虫逻辑

    } else if(e.special==='suicidal'){
      const dx=G.mx-e.x,dy=G.my-e.y,d=Math.hypot(dx,dy)||1;

    } else {

    }
    const ev=Math.hypot(e.vx,e.vy);if(ev>e.spd*2.2){e.vx=e.vx/ev*e.spd*2.2;e.vy=e.vy/ev*e.spd*2.2;}

    if(e.hasKB&&e.kbCd<=0){G.bugs.forEach(b=>{if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz/2+6){knockback(b,e.x,e.y,4);e.kbCd=45;addPt(G,b.x,b.y,'#EF9F27',3,1.5);}});}
  });

  // Boss行动
  if(G.boss){
    const boss=G.boss;
    if(boss.poison>0){boss.poison--;if(boss.poison%18===0){boss.hp-=0.35;addPt(G,boss.x,boss.y,'#639922',2,0.8);}}

      addPt(G,boss.x,boss.y,'#EF9F27',25,4);addPt(G,boss.x,boss.y,'#E24B4A',15,3);

      if(G.leechLv>0)G.mhp=Math.min(G.mmaxhp,G.mhp+boss.reward*2);
      G.boss=null;G.bossMode=false;G.bossKillCount=(G.bossKillCount||0)+1;

      setTimeout(resizeCanvas,10);
      showUpgrade();return;
    }
  }

  // 抛射物
  const dp=[];
  G.projs.forEach((p,i)=>{
    p.age++;
    if(p.homing&&p.homing.hp>0){const dx=p.homing.x-p.x,dy=p.homing.y-p.y,d=Math.hypot(dx,dy)||1;p.vx=p.vx*0.88+(dx/d)*6*0.12;p.vy=p.vy*0.88+(dy/d)*6*0.12;}
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0||p.x<-10||p.x>W+10||p.y<-10||p.y>H+10){dp.push(i);recycleProj(p);return;}
    if(p.isBossBullet||p.isEnemyBullet){
      G.bugs.forEach(b=>{if(Math.hypot(b.x-p.x,b.y-p.y)<8){b.hp-=p.dmg;}});
      if(Math.hypot(G.mx-p.x,G.my-p.y)<14){G.mhp-=p.dmg*0.5;G.combo=0;G.comboTimer=0;G.noDmgTimer=0;screenShake(5);triggerFlash();playSound('hurt');dp.push(i);recycleProj(p);}
      return;
    }
    // isBugShot：纯粹只打敌人，绝不触发任何友方/玩家伤害逻辑
    if(p.isBugShot){
      let bsHit=false;
      const bsCheck=(e)=>{
        if(bsHit)return;
        if(Math.hypot(e.x-p.x,e.y-p.y)<e.sz/2+p.r){
          bsHit=true;
          const actualDmg=p.dmg/(e.defMult||1)/(e.shield>0?3:1);
          e.hp-=actualDmg;
          if(p.poison&&!e.immuneDot){e.poison=Math.max(e.poison||0,p.poison);}
          addDamageText(G,e.x+(Math.random()-0.5)*10,e.y-4,Math.ceil(actualDmg)+'','#88ddaa',13);
          addPt(G,e.x,e.y,'#9FE1CB',1,1);
          dp.push(i);recycleProj(p);
        }
      };

      return;
    }
    let hit=false;
    const check=(e)=>{
      if(hit&&!p.pierce)return;
      if(Math.hypot(e.x-p.x,e.y-p.y)<e.sz/2+p.r){
        const shieldDiv=e.shield>0?3:1;

        const actualDmg=p.dmg/(e.defMult||1)/shieldDiv/bubbleDiv;

        if(e.shield>0&&!p.poison){e.shield=Math.max(0,e.shield-0.3);addPt(G,e.x,e.y,'#4488CC',3,1.5);hit=true;if(!p.pierce){dp.push(i);recycleProj(p);}return;}
        hit=true;
        const isBig=actualDmg>=10,isMed=actualDmg>=5;
        addDamageText(G,e.x+(Math.random()-0.5)*12,e.y-4,Math.ceil(actualDmg)+'',isBig?'#ff2200':isMed?'#ff7700':'#ffcc44',isBig?26:isMed?20:15);

            addArc(G,ct.x,ct.y,0);

      }

  });
  for(let i=dp.length-1;i>=0;i--)G.projs.splice(dp[i],1);

  // 虫子死亡
  const db=[];
  G.bugs.forEach((b,i)=>{if(b.hp<=0){db.push(i);addPt(G,b.x,b.y,'#5DCAA5',4,1.8);}});
  for(let i=db.length-1;i>=0;i--){recyclePt(G.bugs[db[i]]);G.bugs.splice(db[i],1);}

  // 敌人死亡
  const de=[];
  G.enemies.forEach((e,i)=>{
    if(e.hp<=0){
      de.push(i);G.kills++;G.xp+=2+G.phase*2;
      if(G.comboTimer>0){G.combo++;}else{G.combo=1;}

      addExplosionWave(G,e.x,e.y,12,'#ff6633');

      if(G.combo===300){showBuffToast('☠ 300连杀 · 世界开始失控！','#ff2200');screenShake(8);for(let j=0;j<5;j++)spawnEnemy(G);}

        G.bugs.forEach(b=>{if(Math.hypot(b.x-e.x,b.y-e.y)<e.explodeR){b.hp-=e.explodeDmg*0.3;knockback(b,e.x,e.y,6);}});
        const edist=Math.hypot(G.mx-e.x,G.my-e.y);if(edist<e.explodeR)G.mhp-=e.explodeDmg*(1-edist/e.explodeR);
      }
      if(Math.random()<(G.killSpawn||0))spawnBug(1,e.x,e.y);
      if(G.leechLv>=1)G.mhp=Math.min(G.mmaxhp,G.mhp+0.8*G.leechLv);
      // V13: 死亡同步（狂暴流）：低血量击杀回血
      if(G.deathSync&&G.mhp/G.mmaxhp<0.3)G.mhp=Math.min(G.mmaxhp,G.mhp+3);
    }
  });
  for(let i=de.length-1;i>=0;i--)G.enemies.splice(de[i],1);

  if(G.arcs){G.arcs.forEach(a=>a.life--);G.arcs=G.arcs.filter(a=>a.life>0);}
  G.pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=0.022;p.r*=0.96;});
  G.pts=G.pts.filter(p=>{if(p.life<=0){recyclePt(p);return false;}return true;});

  if(G.xp>=G.xpNext){G.xp-=G.xpNext;G.xpNext=Math.floor(G.xpNext*1.38);G.lv++;screenShake(4);playSound('levelup');showUpgrade();return;}
  if((G.pendingUpgrade||0)>0&&!G.upgrading){G.pendingUpgrade--;showUpgrade();return;}
  if(G.mhp<=0){doGameover();return;}
  if(G.bugs.length===0&&G.enemies.length>10)G.mhp-=0.06; // 无虫惩罚加重
  updateBuffToast();
  updateHUD();
}

// ══════ 升级面板（V13: Build引导权重）══════
function showUpgrade(){
  G.paused=true;G.upgrading=true;
  const equippedIds=G.slots.filter(s=>s.id).map(s=>s.id);
  const hasEmpty=G.slots.some(s=>!s.id);
  const pendingMerge=[];
  Object.entries(G.pendingStarFor||{}).forEach(([evolveId,slotIdx])=>{
    const srcSl=G.slots[slotIdx];if(!srcSl||!srcSl.id)return;
    const sw=WEAPONS[srcSl.id];if(!sw||sw.type==='evolve'||sw.type==='evolvePassive')return;
    if(sw.evolve!==evolveId)return;if(srcSl.lv<sw.maxLv)return;
    const targetSl=G.slots.find(s=>s.id===evolveId);if(!targetSl||targetSl.stars>=5)return;
    pendingMerge.push({srcSlot:srcSl,srcIdx:slotIdx,targetSlot:targetSl,evolveId});
  });
  const pendingSlotIdxs=new Set(Object.values(G.pendingStarFor||{}));
  const upgradeable=G.slots.filter((s,i)=>{
    if(!s.id)return false;const w=WEAPONS[s.id];

  });
  const evolveable=G.slots.filter((s,i)=>{
    if(!s.id)return false;const w=WEAPONS[s.id];
    if(w.type==='evolve'||w.type==='evolvePassive')return false;
    if(s.lv<w.maxLv)return false;if(!w.evolve)return false;
    if(equippedIds.includes(w.evolve))return false;if(pendingSlotIdxs.has(i))return false;return true;
  });
  const stackSource=[];
  if(hasEmpty){
    G.slots.forEach((sl)=>{
      if(!sl.id)return;const w=WEAPONS[sl.id];
      if(w.type!=='evolve'&&w.type!=='evolvePassive')return;if(sl.stars>=5)return;if(!w.sourceWeapon)return;
      const alreadyPending=Object.values(G.pendingStarFor||{}).some(idx=>G.slots[idx]&&G.slots[idx].id===w.sourceWeapon);
      if(alreadyPending)return;const srcInSlot=G.slots.some(s=>s.id===w.sourceWeapon);if(srcInSlot)return;
      stackSource.push({evolveSlot:sl,evolveId:sl.id,sourceId:w.sourceWeapon,sourceW:WEAPONS[w.sourceWeapon]});

  // 对流派武器排序提升权重
  const buildPriorityPool=newPool.sort((a,b)=>{
    const wa=G.buildWeights[a]||1,wb=G.buildWeights[b]||1;
    return (Math.random()<wb/(wa+wb)?1:-1);
  });
  let choices=[];
  if(pendingMerge.length>0)choices.push({kind:'merge',m:pendingMerge[0]});
  if(choices.length<3&&evolveable.length>0&&Math.random()<0.75)choices.push({kind:'evolve',slot:evolveable[Math.floor(Math.random()*evolveable.length)]});
  if(choices.length<3&&stackSource.length>0){const ss=stackSource[Math.floor(Math.random()*stackSource.length)];choices.push({kind:'stackSrc',ss});}
  const upShuffled=upgradeable.sort(()=>Math.random()-0.5);upShuffled.slice(0,2).forEach(sl=>{if(choices.length<3)choices.push({kind:'upgrade',slot:sl});});
  if(hasEmpty){const newShuffled=[...buildPriorityPool];while(choices.length<3&&newShuffled.length>0)choices.push({kind:'new',wid:newShuffled.pop()});}
  while(choices.length<3&&upgradeable.length>0)choices.push({kind:'upgrade',slot:upgradeable[Math.floor(Math.random()*upgradeable.length)]});
  choices=choices.slice(0,3);if(choices.length===0){G.paused=false;G.upgrading=false;return;}
  const el=document.getElementById('up-cards');el.innerHTML='';
  const hasMerge=choices.some(c=>c.kind==='merge'),hasEv=choices.some(c=>c.kind==='evolve'),hasStack=choices.some(c=>c.kind==='stackSrc');
  document.getElementById('up-title').textContent=hasMerge?'⚡ 叠星进化！':hasEv?'⚡ 超武进化时机！':hasStack?'★ 叠星路线开启！':'拾取技能';
  choices.forEach(c=>{
    const card=document.createElement('div');card.className='upgrade-card';
    if(c.kind==='new'){const w=WEAPONS[c.wid];card.innerHTML=`<div class="uc-name">${w.name}</div><span class="uc-type type-${w.type}">${typeName(w.type)}</span><div class="uc-desc">${w.desc[0]}</div><div class="uc-lv">新获得</div>`;card.onclick=()=>pickNew(c.wid);}
    else if(c.kind==='upgrade'){const sl=c.slot;const w=WEAPONS[sl.id];const nl=sl.lv+1;const willEvolve=nl>=w.maxLv&&w.evolve&&!equippedIds.includes(w.evolve);card.innerHTML=`<div class="uc-name">↑ ${w.name}</div><span class="uc-type type-${w.type}">${typeName(w.type)}</span><div class="uc-desc">${w.desc[Math.min(sl.lv,w.desc.length-1)]}</div><div class="uc-lv">Lv.${sl.lv}→${nl}${willEvolve?'（满级可进化）':''}</div>`;
      card.onclick=()=>{const wCheck=WEAPONS[sl.id];if(wCheck.type==='evolve'||wCheck.type==='evolvePassive'){closeUpgrade();return;}sl.lv++;const w2=WEAPONS[sl.id];if(w2.onEquip)w2.onEquip(G,sl.lv);closeUpgrade();};}
    else if(c.kind==='evolve'){const sl=c.slot;const w=WEAPONS[sl.id];const ew=WEAPONS[w.evolve];card.className+=' evolved-card';card.innerHTML=`<div class="uc-name">★ 进化：${ew.name}</div><span class="uc-type type-evolve">超武进化</span><div class="uc-desc">${ew.desc[0]}</div><div class="uc-lv">${w.name} 满级 → 超武★</div>`;

      card.onclick=()=>{const emptySl=G.slots.find(s=>!s.id);if(!emptySl){closeUpgrade();return;}const idx=G.slots.indexOf(emptySl);emptySl.id=ss.sourceId;emptySl.lv=1;emptySl.timer=0;emptySl.state={};emptySl.stars=0;const sw2=WEAPONS[ss.sourceId];if(sw2.onEquip)sw2.onEquip(G,1);if(!G.pendingStarFor)G.pendingStarFor={};G.pendingStarFor[ss.evolveId]=idx;closeUpgrade();};}
    else if(c.kind==='merge'){const {srcSlot,srcIdx,targetSlot,evolveId}=c.m;const sw=WEAPONS[srcSlot.id];const ew=WEAPONS[evolveId];const nextStar=targetSlot.stars+1;const starCardCls=['evolved-card','evolved2-card','evolved3-card','evolved4-card','evolved5-card','evolved6-card'];const starTypeCls=['type-evolve','type-evolve2','type-evolve3','type-evolve4','type-evolve5','type-evolve5'];const starNames=['一星','二星','三星','四星','五星','六星'];card.className+=' '+starCardCls[Math.min(nextStar,5)];card.innerHTML=`<div class="uc-name">⚡ 叠星：${ew.name} ${starStr(nextStar)}</div><span class="uc-type ${starTypeCls[Math.min(nextStar,5)]}">${starNames[Math.min(nextStar,5)]}超武</span><div class="uc-desc">效果×${nextStar+1}，冷却-${Math.min(nextStar*15+15,70)}%<br>槽位释放！</div><div class="uc-lv">${sw.name} 满级叠加</div>`;
      card.onclick=()=>{targetSlot.stars=nextStar;const ew2=WEAPONS[evolveId];if(ew2.onEquip)ew2.onEquip(G,targetSlot.lv,nextStar);srcSlot.id=null;srcSlot.lv=0;srcSlot.timer=0;srcSlot.state={};srcSlot.stars=0;delete G.pendingStarFor[evolveId];showAlert(`⚡ ${ew.name} ${starStr(nextStar)} 叠星！`,'green');closeUpgrade();};}
    el.appendChild(card);
  });
  document.getElementById('upgrade-overlay').classList.add('show');
}

function draw(){
  ctx.save();
  if(shakePower>0){ctx.translate((Math.random()-0.5)*shakePower,(Math.random()-0.5)*shakePower);shakePower*=0.84;if(shakePower<0.2)shakePower=0;}
  ctx.clearRect(0,0,W,H);

  // ── 背景 ──
  ctx.fillStyle='#050a05';ctx.fillRect(0,0,W,H);

  // ── V13: 世界脉冲闪光 ──
  if((G.worldPulseFlash||0)>0){
    const pf=G.worldPulseFlash;
    ctx.fillStyle=`rgba(255,60,0,${(pf/40)*0.2})`;ctx.fillRect(0,0,W,H);
  }

  // ── 菌毯地面 ──
  const inf=Math.min(1,G.infection||0);
  if(inf>0){ctx.fillStyle=`rgba(18,55,18,${0.04+inf*0.1})`;ctx.fillRect(0,0,W,H);}
  // [v14已移除] 菌丝墙渲染

  // 菌毯斑块
  (G.infectionMap||[]).forEach(z=>{
    const pulse=Math.sin(z.pulse)*0.12+0.88;
    const alpha=(z.life/1200)*0.15*pulse*(inf+0.25);
    const g2=ctx.createRadialGradient(z.x,z.y,2,z.x,z.y,z.r*pulse);
    if(z.hostile){
      g2.addColorStop(0,`rgba(180,60,30,${Math.min(0.3,alpha*2.5)})`);
      g2.addColorStop(0.6,`rgba(100,30,15,${alpha*1.5})`);
      g2.addColorStop(1,'rgba(0,0,0,0)');
    } else {
      g2.addColorStop(0,`rgba(40,160,70,${Math.min(0.3,alpha*2)})`);
      g2.addColorStop(0.6,`rgba(22,90,35,${alpha})`);
      g2.addColorStop(1,'rgba(0,0,0,0)');
    }
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(z.x,z.y,z.r*pulse,0,Math.PI*2);ctx.fill();
  });

  // ── 危险区域 ──
  (G.dangerZones||[]).forEach(z=>{
    const pulse=Math.sin(G.elapsed*0.08)*0.15+0.85;
    let zColor;
    switch(z.type){case'plasma':zColor='rgba(100,160,255,';break;case'spore':zColor='rgba(100,255,50,';break;case'corrosion':zColor='rgba(200,120,30,';break;default:zColor='rgba(200,50,50,';}
    if(!z.active){
      const warnAlpha=0.15+Math.sin(G.elapsed*0.2)*0.1;
      ctx.save();ctx.strokeStyle=zColor+'0.8)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
      ctx.globalAlpha=warnAlpha*2;
      ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    } else {
      const g2=ctx.createRadialGradient(z.x,z.y,z.r*0.3,z.x,z.y,z.r);
      g2.addColorStop(0,zColor+'0.12)');g2.addColorStop(0.7,zColor+'0.08)');g2.addColorStop(1,zColor+'0)');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(z.x,z.y,z.r*pulse,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=zColor+'0.5)';ctx.lineWidth=1.5;ctx.globalAlpha=0.4+Math.sin(G.elapsed*0.1)*0.2;
      ctx.beginPath();ctx.arc(z.x,z.y,z.r*pulse,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
  });
  (G.dangerCircles||[]).forEach(c=>{
    const alpha=c.life/90;
    ctx.save();ctx.globalAlpha=Math.min(0.8,alpha*0.7);ctx.strokeStyle=c.color||'#9B4AFF';ctx.lineWidth=2;
    ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  });

  // ── 世界状态背景 ──
  if(G.bossMode){ctx.fillStyle='rgba(140,15,40,0.05)';ctx.fillRect(0,0,W,H);}
  if(G.worldCorrupt){const a=0.04+Math.sin(G.elapsed*0.02)*0.02;ctx.fillStyle=`rgba(160,0,100,${a})`;ctx.fillRect(0,0,W,H);}
  if(G.overmind){
    ctx.fillStyle='rgba(220,0,130,0.05)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.globalAlpha=0.12+Math.sin(G.elapsed*0.05)*0.06;ctx.strokeStyle='#ff00aa';ctx.lineWidth=8;ctx.strokeRect(4,4,W-8,H-8);ctx.restore();
  }
  // [v14已移除] 视野污染渲染
  // V13: UI腐蚀（Boss主巢阶段3）
  if((G.uiCorrupt||0)>0){
    const uc=G.uiCorrupt;
    // 边框蠕动
    ctx.save();ctx.globalAlpha=uc*0.5;
    for(let i=0;i<3;i++){
      ctx.strokeStyle=`rgba(${Math.floor(100+Math.random()*100)},0,${Math.floor(100+Math.random()*80)},0.7)`;
      ctx.lineWidth=3+i*2;
      ctx.strokeRect(i*3+Math.sin(G.elapsed*0.05+i)*3,i*3+Math.cos(G.elapsed*0.04+i)*3,W-i*6,H-i*6);
    }
    ctx.restore();
  }

  if(G.eliteFlash>0){ctx.fillStyle=`rgba(0,0,0,${G.eliteFlash/35*0.28})`;ctx.fillRect(0,0,W,H);G.eliteFlash--;}

  // 毒液水洼
  (G.slimePools||[]).forEach(s=>{
    const g=ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,s.r);
    g.addColorStop(0,'rgba(70,230,110,0.20)');g.addColorStop(1,'rgba(70,230,110,0)');

  });
  G.slimePools=(G.slimePools||[]).filter(s=>s.life>0);

  // 炼狱火环：动态火焰光环
  G.slots.forEach(sl=>{
    if(sl.id&&sl.id==='inferno_ring'&&sl.state.drawR){
      const r=sl.state.drawR,stars=sl.state.stars||0,ha=sl.state.haloAngle||0;
      const rt=sl.state.ringTimer||0;
      const flameRgba=['rgba(232,93,36,','rgba(255,120,0,','rgba(255,68,0,','rgba(255,34,0,','rgba(255,0,136,','rgba(204,0,255,'];
      const innerCol=flameRgba[Math.min(stars,5)];
      // 基础光环（旋转虚线）

      ctx.strokeStyle=innerCol+'0.35)';ctx.lineWidth=2+Math.min(stars,5)*0.5;
      ctx.setLineDash([10+stars*4,8-stars*2]);ctx.lineDashOffset=-ha*r;

      const pulseR=r*0.6+Math.sin(rt*0.18)*8;
      ctx.strokeStyle=innerCol+'0.18)';ctx.lineWidth=1.5;
      ctx.setLineDash([6,10]);ctx.lineDashOffset=ha*r*0.7;

  ctx.fillStyle=`rgba(29,158,117,${0.1+0.06*Math.sin(G.elapsed*0.05)})`;
  ctx.beginPath();ctx.arc(G.mx,G.my,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=bodyColor;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(G.mx,G.my,12,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=tier>=3?bodyColor:'#9FE1CB';ctx.beginPath();ctx.arc(G.mx,G.my,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // 血条
  const hbw=48,hbh=5;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(G.mx-hbw/2,G.my-36,hbw,hbh);
  const hbCol=hpPct<0.3?'#ff3333':hpPct<0.6?'#EF9F27':'#44ee66';
  ctx.fillStyle=hbCol;ctx.fillRect(G.mx-hbw/2,G.my-36,hbw*hpPct,hbh);
  if(hpPct>0.05){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(G.mx-hbw/2,G.my-36,hbw*hpPct,hbh/2);}

  // Vignette（始终保留玩家清晰）
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // 爆炸波纹
  (G.waves||[]).forEach(w=>{ctx.save();ctx.globalAlpha=w.life/20;ctx.strokeStyle=w.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke();ctx.restore();w.r+=5;w.life--;});
  G.waves=(G.waves||[]).filter(w=>w.life>0);

  // 伤害数字（后期小伤害隐藏）
  const dmgThreshold=G.comboTier>=4?5:0;
  (G.damageTexts||[]).forEach(t=>{
    if(parseInt(t.text)<dmgThreshold&&G.comboTier>=4)return;// 视觉优先级
    ctx.save();ctx.globalAlpha=t.life/40;ctx.fillStyle=t.color;ctx.font='bold '+t.size+'px Arial';ctx.textAlign='center';ctx.shadowColor=t.color;ctx.shadowBlur=6;ctx.fillText(t.text,t.x,t.y);ctx.restore();t.y+=t.vy;t.life--;
  });
  G.damageTexts=(G.damageTexts||[]).filter(t=>{if(t.life<=0){recycleDmg(t);return false;}return true;});

  // ── Combo UI ──
  if(G.combo>=2){
    ctx.save();const tc=G.comboTier>=7?'#ff00aa':G.comboTier>=5?'#ff3300':G.comboTier>=3?'#ff8800':G.comboTier>=1?'#ffcc00':'#ffff44';
    // V13: 高combo combo数字脉动更强烈
    const scale=1+Math.sin(G.elapsed*0.2)*0.07*(1+G.comboTier*0.05);
    ctx.translate(W/2,78);ctx.scale(scale,scale);ctx.textAlign='center';ctx.shadowColor=tc;ctx.shadowBlur=16+G.comboTier*4;ctx.fillStyle=tc;
    const tierNames=['','热身','狩猎','侵蚀','暴走','母巢同步','污染扩张','世界侵蚀','虫巢暴走'];
    const tierLabel=G.comboTier>0?' ['+tierNames[G.comboTier]+']':'';
    ctx.font='bold 26px Arial';ctx.fillText(G.combo+' COMBO'+tierLabel,0,0);ctx.restore();
  }

  // 闪屏
  // [v15] 白屏闪烁已关闭

  ctx.restore();
}

function loop(){update();draw();G._raf=requestAnimationFrame(loop);}

// ══════ 输入 ══════
window.addEventListener('keydown',e=>{G&&(G.keys[e.key]=true);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();if(e.key==='Escape'||e.key==='p'||e.key==='P')togglePause();});
window.addEventListener('keyup',e=>{G&&(G.keys[e.key]=false);});
CV.addEventListener('mousemove',e=>{const r=CV.getBoundingClientRect();mX=e.clientX-r.left;mY=e.clientY-r.top;});
let dpadState={u:false,d:false,l:false,r:false};
function bindDpad(id,key,sk){const el=document.getElementById(id);if(!el)return;const press=e=>{e.preventDefault();dpadState[sk]=true;if(G)G.keys[key]=true;};const release=e=>{e.preventDefault();dpadState[sk]=false;if(G)G.keys[key]=false;};el.addEventListener('touchstart',press,{passive:false});el.addEventListener('touchend',release,{passive:false});el.addEventListener('mousedown',press);el.addEventListener('mouseup',release);el.addEventListener('mouseleave',release);}
bindDpad('du','ArrowUp','u');bindDpad('dd','ArrowDown','d');bindDpad('dl','ArrowLeft','l');bindDpad('dr','ArrowRight','r');
let touchStart=null;
CV.addEventListener('touchstart',e=>{e.preventDefault();const r=CV.getBoundingClientRect();touchStart={x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();if(!touchStart||!G)return;const r=CV.getBoundingClientRect();const tx=e.touches[0].clientX-r.left,ty=e.touches[0].clientY-r.top;G.mx=Math.max(14,Math.min(W-14,G.mx+(tx-touchStart.x)*0.5));G.my=Math.max(14,Math.min(H-14,G.my+(ty-touchStart.y)*0.5));touchStart={x:tx,y:ty};},{passive:false});
CV.addEventListener('touchend',e=>{e.preventDefault();touchStart=null;},{passive:false});

initGame();
</script>
